spring.application.name=tg-personal-assistant

# Database disabled for now — bot runs with a mock reply, no persistence yet.
# To re-enable: delete this exclusion, uncomment the datasource/jpa lines below,
# and add the sqlite-jdbc + hibernate-community-dialects dependencies to pom.xml.
spring.autoconfigure.exclude=\
  org.springframework.boot.jdbc.autoconfigure.DataSourceAutoConfiguration,\
  org.springframework.boot.hibernate.autoconfigure.HibernateJpaAutoConfiguration,\
  org.springframework.boot.data.jpa.autoconfigure.JpaRepositoriesAutoConfiguration

# spring.datasource.url=jdbc:sqlite:data/tg-personal-assistant.db
# spring.datasource.driver-class-name=org.sqlite.JDBC

# spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
# spring.jpa.hibernate.ddl-auto=update
# spring.jpa.open-in-view=false

# Telegram bot credentials — supplied via environment variables, never committed.
telegram.bot.token=${TELEGRAM_BOT_TOKEN:}
telegram.bot.username=${TELEGRAM_BOT_USERNAME:}

spring.application.name=tg-personal-assistant
spring.config.import=optional:file:.env[.properties]

# SQLite database file lives under the project-root db/ folder.
spring.datasource.url=jdbc:sqlite:db/tg-personal-assistant.db
spring.datasource.driver-class-name=org.sqlite.JDBC

spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
# Flyway owns the schema; Hibernate must not touch it.
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false

# Flyway schema versioning — migrations in src/main/resources/db/migration.
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Telegram bot credentials — supplied via environment variables, never committed.
telegram.bot.token=${TELEGRAM_BOT_TOKEN:}
telegram.bot.username=${TELEGRAM_BOT_USERNAME:}
